name: dev-CD

on:
  push:
    branches: [ "develop" ]

env:
  ECR_HOST: ${{ secrets.DEV_ECR_HOST }}
  API_ECR_APP_NAME: ${{ secrets.DEV_API_ECR_APP_NAME }}
  CHAT_ECR_APP_NAME: ${{ secrets.DEV_CHAT_ECR_APP_NAME }}
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-22.04
    environment: dev

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Inject API secrets
        run: |
          echo "${{ secrets.API_APPLICATION_DEV }}" > api-server/src/main/resources/application-dev.yml
          mkdir -p api-server/src/main/resources/firebase
          echo "${{ secrets.API_FIREBASE_JSON }}" > api-server/src/main/resources/firebase/napzak-firebase-adminsdk.json

      - name: Inject Chat secrets
        run: |
          echo "${{ secrets.CHAT_APPLICATION_DEV }}" > chat-server/src/main/resources/application-dev.yml
          mkdir -p chat-server/src/main/resources/firebase
          echo "${{ secrets.CHAT_FIREBASE_JSON }}" > chat-server/src/main/resources/firebase/napzak-firebase-adminsdk.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_DEV_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_DEV_SECRET_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-northeast-2 | \
          docker login --username AWS --password-stdin ${{ env.ECR_HOST }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ env.API_ECR_APP_NAME }}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${{ env.API_ECR_APP_NAME }}" >/dev/null
          aws ecr describe-repositories --repository-names "${{ env.CHAT_ECR_APP_NAME }}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${{ env.CHAT_ECR_APP_NAME }}" >/dev/null

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile-api-dev
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_HOST }}/${{ env.API_ECR_APP_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_HOST }}/${{ env.API_ECR_APP_NAME }}:latest

      - name: Build & push CHAT image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile-chat-dev
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_HOST }}/${{ env.CHAT_ECR_APP_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_HOST }}/${{ env.CHAT_ECR_APP_NAME }}:latest

  deploy:
    needs: build-push
    runs-on: ubuntu-22.04
    environment: dev

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@master
        env:
          ECR_HOST: ${{ env.ECR_HOST }}
          API_ECR_APP_NAME: ${{ env.API_ECR_APP_NAME }}
          CHAT_ECR_APP_NAME: ${{ env.CHAT_ECR_APP_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USERNAME }}
          key: ${{ secrets.DEV_SERVER_KEY }}
          envs: ECR_HOST,API_ECR_APP_NAME,CHAT_ECR_APP_NAME,IMAGE_TAG
          script: |
            bash /home/ubuntu/deploy-napzak-dev.sh
